{{ define "main" }}
    <h1 class="text-2xl font-bold mb-4">{{ .Title | default (.Section | humanize) }}</h1>
    {{ .Content }}
    {{ range .Pages }}
        {{ partial "list-item.html" . }}
    {{ end }}
    {{- /* Pagination */ -}}
    {{ if .Paginator }}
    {{ partial "pagination.html" . }}
    {{ end }}
{{ end }}
